<style>
  :root {
    --bg: #f3ebdd;
    --bg-2: #ebe1ce;
    --bg-3: #e3d6bd;
    --ink: #1a1411;
    --ink-2: #3a2f26;
    --muted: #8a6f5c;
    --line: #d8c9ad;
    --line-strong: #b9a384;
    --accent: #c8553d;
    --accent-2: #a8401f;
    --ochre: #d4a04a;
    --sage: #6e7d52;
    --paper: #faf4e8;
    --shadow: 0 1px 0 rgba(26,20,17,0.05), 0 12px 30px -18px rgba(26,20,17,0.25);

    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --font-display: 'JetBrains Mono', ui-monospace, monospace;
    --font-body: 'JetBrains Mono', ui-monospace, monospace;
  }
  [data-theme="dark"] {
    --bg: #1a1411;
    --bg-2: #221a15;
    --bg-3: #2b2018;
    --ink: #f0e6d2;
    --ink-2: #d8c9ad;
    --muted: #a08c75;
    --line: #3a2d22;
    --line-strong: #5a4631;
    --paper: #221a15;
    --shadow: 0 1px 0 rgba(0,0,0,0.4), 0 18px 40px -22px rgba(0,0,0,0.7);
  }
  [data-accent="terracotta"] { --accent: #c8553d; --accent-2: #a8401f; }
  [data-accent="ochre"]      { --accent: #c98a2c; --accent-2: #a06a15; }
  [data-accent="sage"]       { --accent: #6e7d52; --accent-2: #525e3c; }
  [data-accent="rust"]       { --accent: #9e3d24; --accent-2: #762a18; }

  [data-type="mono-serif"] {
    --font-display: 'Instrument Serif', 'Fraunces', Georgia, serif;
    --font-body: 'JetBrains Mono', ui-monospace, monospace;
  }
  [data-type="all-mono"] {
    --font-display: 'JetBrains Mono', ui-monospace, monospace;
    --font-body: 'JetBrains Mono', ui-monospace, monospace;
  }
  [data-type="plex"] {
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'IBM Plex Mono', ui-monospace, monospace;
  }
  [data-type="space"] {
    --font-display: 'Space Mono', monospace;
    --font-body: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    background-image:
      radial-gradient(1200px 600px at 80% -10%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 60%),
      radial-gradient(900px 500px at -10% 30%, color-mix(in oklab, var(--ochre) 10%, transparent), transparent 60%);
    background-attachment: fixed;
  }
  ::selection { background: var(--accent); color: var(--paper); }

  a { color: inherit; }

  /* ---- grid paper background ---- */
  .paper-grid {
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
  }

  /* ---- type ---- */
  .display {
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.02;
  }
  [data-type="mono-serif"] .display, [data-type="plex"] .display {
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .mono { font-family: var(--font-mono); }
  .kbd {
    display: inline-block;
    border: 1px solid var(--line-strong);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg-2);
    color: var(--ink-2);
  }

  /* ---- buttons ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid var(--line-strong);
    background: var(--bg-2);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 13px;
    cursor: pointer;
    transition: transform .12s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
    text-decoration: none;
  }
  .btn:hover { transform: translateY(-1px); background: var(--bg-3); border-color: var(--ink-2); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent-2);
    color: var(--paper);
  }
  .btn-accent:hover { background: var(--accent-2); }

  /* ---- chip ---- */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 9px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    background: var(--bg-2);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-2);
    line-height: 1.4;
  }

  /* ---- card ---- */
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow);
  }

  /* ---- reveal on scroll ---- */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity .8s ease, transform .8s ease; }
  .reveal.in { opacity: 1; transform: none; }

  /* ---- terminal styling ---- */
  .term {
    background: #14100d;
    color: #e9dcc1;
    border-radius: 12px;
    border: 1px solid #2a2018;
    box-shadow: 0 30px 60px -30px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,0.04) inset;
    font-family: var(--font-mono);
    overflow: hidden;
  }
  [data-theme="dark"] .term {
    background: #0e0a07;
    border-color: #3a2d22;
  }
  .term-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid #2a2018;
    background: linear-gradient(180deg, #1c1610, #14100d);
    color: #a08c75;
    font-size: 12px;
  }
  .term-dot { width: 11px; height: 11px; border-radius: 50%; display:inline-block; }
  .term-body { padding: 18px 20px; min-height: 280px; }
  .prompt { color: var(--accent); }
  .cmt { color: #7a6a52; }
  .ok  { color: #a8c272; }
  .info{ color: #d4a04a; }
  .key { color: #d4a04a; }
  .str { color: #e9b48a; }

  /* caret */
  .caret { display: inline-block; width: 8px; height: 1em; background: #e9dcc1; vertical-align: -2px; margin-left: 2px; animation: blink 1.05s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- nav ---- */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(10px);
    background: color-mix(in oklab, var(--bg) 78%, transparent);
    border-bottom: 1px solid var(--line);
  }

  /* ---- section header ---- */
  .sect-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .sect-label::before {
    content: "";
    width: 22px; height: 1px; background: var(--accent);
    display: inline-block;
  }

  /* ---- inputs ---- */
  input, textarea, select, button { font-family: inherit; }
  .input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .input:focus { border-color: var(--accent); background: var(--paper); }

  /* mini browser */
  .mini-browser {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .mini-browser-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    font-family: var(--font-mono); font-size: 11px;
    color: var(--muted);
  }
  .url {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--ink-2);
    font-size: 11px;
  }

  /* shimmering loading */
  .shim {
    background: linear-gradient(90deg, var(--bg-2), var(--bg-3), var(--bg-2));
    background-size: 200% 100%;
    animation: shim 1.4s linear infinite;
    border-radius: 4px;
  }
  @keyframes shim { 0% { background-position: 0 0; } 100% { background-position: -200% 0; } }

  /* dots in stack diagram */
  .dot-row { display: flex; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line-strong); }
  .dot.filled { background: var(--accent); }

  /* footnote */
  hr.rule { border: none; border-top: 1px dashed var(--line-strong); margin: 0; }

  /* mobile */
  @media (max-width: 720px) {
    body { font-size: 14px; }
  }
</style>
